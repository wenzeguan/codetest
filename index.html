<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Daily Todo</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      color: #1f2937;
      background: #f8fafc;
    }
    body {
      margin: 0;
      padding: 24px;
      display: flex;
      justify-content: center;
    }
    .app {
      width: min(760px, 100%);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 18px;
    }
    h1 { margin: 0 0 14px; font-size: 1.35rem; }
    form {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      margin-bottom: 16px;
    }
    input, button {
      font-size: 0.95rem;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
    }
    button {
      background: #111827;
      color: #fff;
      cursor: pointer;
      border-color: #111827;
    }
    .muted { color: #64748b; font-size: 0.85rem; margin-bottom: 10px; }
    .category {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .category h2 {
      margin: 0;
      padding: 10px 12px;
      font-size: 1rem;
      background: #f1f5f9;
      border-bottom: 1px solid #e5e7eb;
    }
    ul { list-style: none; margin: 0; padding: 0; }
    li {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid #f1f5f9;
    }
    li:last-child { border-bottom: none; }
    .done { text-decoration: line-through; color: #94a3b8; }
    .meta { font-size: 0.8rem; color: #64748b; }
    .empty { padding: 10px 12px; color: #64748b; }
  </style>
</head>
<body>
  <main class="app">
    <h1>Simple Daily Todo</h1>
    <form id="todo-form">
      <input id="task-input" type="text" placeholder="What do you need to do?" required />
      <input id="deadline-input" type="date" />
      <button type="submit">Add</button>
    </form>
    <div class="muted">Unfinished tasks automatically appear each day until completed.</div>
    <div id="board"></div>
  </main>

  <script>
    const STORAGE_KEY = 'simple_daily_todos_v1';
    const form = document.getElementById('todo-form');
    const taskInput = document.getElementById('task-input');
    const deadlineInput = document.getElementById('deadline-input');
    const board = document.getElementById('board');

    const categoryRules = {
      Work: ['meeting', 'project', 'client', 'report', 'email', 'office', 'task', 'deadline', 'manager', 'team'],
      'Bill Payment': ['bill', 'rent', 'payment', 'invoice', 'electric', 'water', 'internet', 'phone', 'subscription', 'tax'],
      Learning: ['learn', 'study', 'course', 'read', 'practice', 'tutorial', 'training', 'homework', 'exam'],
      Health: ['workout', 'exercise', 'doctor', 'medicine', 'walk', 'run', 'gym', 'sleep'],
      Personal: ['family', 'friend', 'home', 'clean', 'shopping', 'call', 'cook']
    };

    const categoryPriority = ['Work', 'Bill Payment', 'Learning', 'Health', 'Personal', 'General'];

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function loadTasks() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveTasks(tasks) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function autoCategory(text) {
      const lower = text.toLowerCase();
      for (const [category, keywords] of Object.entries(categoryRules)) {
        if (keywords.some((word) => lower.includes(word))) {
          return category;
        }
      }
      return 'General';
    }

    function shouldShowToday(task) {
      if (task.completed) return false;
      if (task.deadline && task.deadline > todayISO()) return false;
      return true;
    }

    function addTask(text, deadline) {
      const tasks = loadTasks();
      tasks.push({
        id: crypto.randomUUID(),
        text,
        deadline: deadline || '',
        category: autoCategory(text),
        completed: false,
        createdAt: new Date().toISOString()
      });
      saveTasks(tasks);
    }

    function toggleComplete(id) {
      const tasks = loadTasks();
      const task = tasks.find((t) => t.id === id);
      if (task) task.completed = !task.completed;
      saveTasks(tasks);
    }

    function sortTasks(a, b) {
      const aHasDeadline = Boolean(a.deadline);
      const bHasDeadline = Boolean(b.deadline);
      if (aHasDeadline && bHasDeadline && a.deadline !== b.deadline) {
        return a.deadline.localeCompare(b.deadline);
      }
      if (aHasDeadline !== bHasDeadline) return aHasDeadline ? -1 : 1;
      return a.createdAt.localeCompare(b.createdAt);
    }

    function render() {
      const tasks = loadTasks().filter(shouldShowToday).sort(sortTasks);
      const grouped = new Map(categoryPriority.map((c) => [c, []]));

      tasks.forEach((task) => {
        if (!grouped.has(task.category)) grouped.set(task.category, []);
        grouped.get(task.category).push(task);
      });

      board.innerHTML = '';

      const entries = Array.from(grouped.entries()).filter(([, list]) => list.length > 0);

      if (!entries.length) {
        board.innerHTML = '<div class="empty">No active tasks today.</div>';
        return;
      }

      entries.forEach(([category, list]) => {
        const section = document.createElement('section');
        section.className = 'category';

        const heading = document.createElement('h2');
        heading.textContent = category;

        const ul = document.createElement('ul');
        list.forEach((task) => {
          const li = document.createElement('li');

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = task.completed;
          checkbox.addEventListener('change', () => {
            toggleComplete(task.id);
            render();
          });

          const content = document.createElement('div');
          const text = document.createElement('div');
          text.textContent = task.text;
          if (task.completed) text.classList.add('done');

          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = task.deadline ? `Deadline: ${task.deadline}` : 'No deadline';

          content.append(text, meta);

          li.append(checkbox, content);
          ul.appendChild(li);
        });

        section.append(heading, ul);
        board.appendChild(section);
      });
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const text = taskInput.value.trim();
      if (!text) return;
      addTask(text, deadlineInput.value);
      form.reset();
      render();
    });

    render();
  </script>
</body>
</html>
